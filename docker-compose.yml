version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: askly_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-askly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-askly_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-askly_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - askly_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-askly} -d ${POSTGRES_DB:-askly_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  askly_postgres_data:
    driver: local
