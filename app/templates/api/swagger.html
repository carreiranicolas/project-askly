<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Swagger UI</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='img/check.svg') }}" />

    <!-- Swagger default CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css"
    />

    <style>
      :root {
        --askly-swagger-bg: #ffffff;
        --askly-swagger-fg: #222222;
      }

      body {
        margin: 0;
        background: var(--askly-swagger-bg);
        color: var(--askly-swagger-fg);
      }

      /* Simple floating toggle, keeps Swagger UI default look */
      .askly-theme-toggle {
        position: fixed;
        top: 12px;
        right: 12px;
        z-index: 9999;
        border: 1px solid rgba(0, 0, 0, 0.15);
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(6px);
        font: 14px/1.2 system-ui, -apple-system, Segoe UI, Roboto, Arial;
        padding: 8px 10px;
        cursor: pointer;
      }

      .askly-theme-toggle:hover {
        background: rgba(255, 255, 255, 1);
      }

      /* Dark mode overrides (minimal) */
      html[data-theme="dark"] {
        --askly-swagger-bg: #0b0f17;
        --askly-swagger-fg: #e6e6e6;
      }

      html[data-theme="dark"] .askly-theme-toggle {
        border-color: rgba(255, 255, 255, 0.2);
        background: rgba(20, 24, 33, 0.85);
        color: #e6e6e6;
      }

      /* Apply dark palette to Swagger UI containers (without rewriting swagger default theme) */
      html[data-theme="dark"] .swagger-ui,
      html[data-theme="dark"] .swagger-ui .opblock,
      html[data-theme="dark"] .swagger-ui .scheme-container,
      html[data-theme="dark"] .swagger-ui .info,
      html[data-theme="dark"] .swagger-ui .model-box,
      html[data-theme="dark"] .swagger-ui .responses-wrapper {
        background: transparent;
      }

      html[data-theme="dark"] .swagger-ui .opblock,
      html[data-theme="dark"] .swagger-ui .scheme-container,
      html[data-theme="dark"] .swagger-ui .info {
        filter: invert(1) hue-rotate(180deg);
      }

      /* Keep images/icons readable after invert */
      html[data-theme="dark"] .swagger-ui img,
      html[data-theme="dark"] .swagger-ui svg {
        filter: invert(1) hue-rotate(180deg);
      }
    </style>
  </head>
  <body>
    <button class="askly-theme-toggle" id="themeToggle" type="button">
      Toggle Dark Mode
    </button>

    <div id="swagger-ui"></div>

    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-standalone-preset.js"></script>
    <script>
      (function () {
        const storageKey = "askly.swagger.theme";
        const root = document.documentElement;

        function applyTheme(theme) {
          if (theme === "dark") root.setAttribute("data-theme", "dark");
          else root.removeAttribute("data-theme");
          localStorage.setItem(storageKey, theme);
          document.getElementById("themeToggle").textContent =
            theme === "dark" ? "Switch to Light" : "Switch to Dark";
        }

        const saved = localStorage.getItem(storageKey);
        const prefersDark =
          window.matchMedia &&
          window.matchMedia("(prefers-color-scheme: dark)").matches;
        applyTheme(saved || (prefersDark ? "dark" : "light"));

        document.getElementById("themeToggle").addEventListener("click", function () {
          const current = root.getAttribute("data-theme") === "dark" ? "dark" : "light";
          applyTheme(current === "dark" ? "light" : "dark");
        });

        window.ui = SwaggerUIBundle({
          url: "/api/swagger.json",
          dom_id: "#swagger-ui",
          deepLinking: true,
          presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
          layout: "BaseLayout",
        });
      })();
    </script>
  </body>
</html>
