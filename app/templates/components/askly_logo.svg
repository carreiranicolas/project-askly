<svg class="askly-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="Askly" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="asklyBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3273dc" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#209cee" stop-opacity="0.06"/>
    </linearGradient>
    <filter id="asklyShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
  </defs>

  <!-- Minimal clean wrapper; logo is the PNG inside an inline SVG -->
  <rect x="40" y="40" width="1120" height="720" rx="48" fill="url(#asklyBg)"/>
  <g filter="url(#asklyShadow)">
    <rect x="90" y="90" width="1020" height="620" rx="44" fill="#ffffff" fill-opacity="0.88"/>
  </g>

  <image href="{{ url_for('static', filename='img/askly.png') }}"
         x="120" y="120" width="960" height="560"
         preserveAspectRatio="xMidYMid meet" />
</svg>

