<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="Askly">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3273dc" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#209cee" stop-opacity="0.06"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
  </defs>

  <!-- Minimal clean wrapper to scale nicely in UI -->
  <rect x="40" y="40" width="1120" height="720" rx="48" fill="url(#bg)"/>
  <g filter="url(#softShadow)">
    <rect x="90" y="90" width="1020" height="620" rx="44" fill="#ffffff" fill-opacity="0.85"/>
  </g>

  <!-- Embed the existing PNG as a crisp, scalable SVG asset -->
  <image
    href="/static/img/askly.png"
    x="260"
    y="130"
    width="680"
    height="540"
    preserveAspectRatio="xMidYMid meet"
  />
</svg>

