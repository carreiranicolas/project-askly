{% extends "layouts/base.html" %}
{% block title %}Página não encontrada | Askly{% endblock %}

{% block body %}
<div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--ask-gray-50); padding: var(--ask-space-6);">
  <div class="askly-card" style="max-width: 480px; width: 100%; text-align: center; padding: var(--ask-space-12) var(--ask-space-8);">
    
    <div style="width: 80px; height: 80px; border-radius: var(--ask-radius-full); background: var(--ask-sky-100); display: flex; align-items: center; justify-content: center; margin: 0 auto var(--ask-space-6);">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--ask-sky-600)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="8" x2="12" y2="12"></line>
        <line x1="12" y1="16" x2="12.01" y2="16"></line>
      </svg>
    </div>

    <h1 style="font-size: var(--ask-text-4xl); font-weight: 800; color: var(--ask-gray-900); margin-bottom: var(--ask-space-2);">404</h1>
    <h2 style="font-size: var(--ask-text-xl); font-weight: 600; color: var(--ask-gray-800); margin-bottom: var(--ask-space-4);">Página não encontrada</h2>
    <p style="color: var(--ask-gray-600); margin-bottom: var(--ask-space-8); line-height: var(--ask-leading-relaxed);">A página que você tentou acessar não existe, foi removida ou você não tem permissão para acessá-la.</p>
    
    <a href="{{ url_for('web_tickets.listar') }}" class="askly-btn askly-btn--primary" style="display: inline-flex; justify-content: center;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: var(--ask-space-2);">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
      Voltar para o Início
    </a>
  </div>
</div>
{% endblock %}
